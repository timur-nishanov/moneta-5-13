<script type="text/babel" data-presets="react">
















const { useState, useRef, useEffect } = React;

/* ---------- Row (text-only list) ---------- */
const Row = ({ date, source, title, desc, tags = [], read }) =>
<div style={{
  display: "grid", gridTemplateColumns: "120px 1fr 100px",
  gap: 32, padding: "20px 0",
  borderTop: "1px solid var(--wf-line-2)", alignItems: "baseline"
}}>
    <div className="small mono" style={{ color: "var(--wf-ink-2)" }}>{source || date}</div>
    <div>
      <div style={{ fontSize: 18, fontWeight: 500, lineHeight: 1.35, letterSpacing: "-0.01em" }}>{title}</div>
      {desc && <div className="body mt-8" style={{ fontSize: 14 }}>{desc}</div>}
      {tags.length > 0 &&
    <div className="row gap-8 mt-12 wrap">
          {tags.map((t) => <Tag key={t}>{t}</Tag>)}
        </div>
    }
    </div>
    {read && <div className="small mono text-mute" style={{ textAlign: "right" }}>{read}</div>}
  </div>;


/* ---------- Plain section heading without numbered eyebrow ---------- */
const Head = ({ title, sub, link, right }) =>
<div className="section-head">
    <div>
      <h2 className="h1" style={{ maxWidth: "22ch" }}>{title}</h2>
      {sub && <div className="lede mt-12" style={{ maxWidth: "60ch" }}>{sub}</div>}
    </div>
    {right ? right : link && <span className="btn-link">{link} <span className="arrow">→</span></span>}
  </div>;


/* ---------- Multi-select dropdown (Mindbox-ish) ---------- */
const MultiDropdown = ({ label, options, selected, setSelected }) => {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);
  useEffect(() => {
    const onClick = (e) => {if (ref.current && !ref.current.contains(e.target)) setOpen(false);};
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, []);
  const toggle = (n) => {
    setSelected(selected.includes(n) ? selected.filter((x) => x !== n) : [...selected, n]);
  };
  return (
    <div className="dd" ref={ref}>
      <button className={`dd-trigger ${open ? "is-open" : ""}`} onClick={() => setOpen((o) => !o)}>
        <span>{label}</span>
        {selected.length > 0 && <span className="count">{selected.length}</span>}
        <span style={{ fontSize: 10, marginLeft: 4, opacity: 0.6 }}>{open ? "▲" : "▼"}</span>
      </button>
      {open &&
      <div className="dd-panel">
          {selected.length > 0 &&
        <div className="row between" style={{ padding: "4px 6px 8px", borderBottom: "1px solid var(--wf-line-2)", marginBottom: 8 }}>
              <span className="small">Выбрано: {selected.length}</span>
              <span className="btn-link" style={{ fontSize: 12 }} onClick={() => setSelected([])}>сбросить</span>
            </div>
        }
          {options.map((opt) => {
          const [n, c] = Array.isArray(opt) ? opt : [opt, null];
          const checked = selected.includes(n);
          return (
            <label key={n} className="dd-item">
                <input type="checkbox" checked={checked} onChange={() => toggle(n)} />
                <span>{n}</span>
                {c != null && <span className="dd-count">{c}</span>}
              </label>);

        })}
        </div>
      }
    </div>);

};

/* ---------- Hero ---------- */
const HeroNewsTeaser = () => {
  const items = [
  { tag: "06 МАЯ", title: "Как увеличить конверсию платежей на сайте", desc: "Что мешает пользователям дойти до оплаты и какие 6 рычагов реально влияют на конверсию в платёж." },
  { tag: "02 МАЯ", title: "Сплитование платежей между селлерами", desc: "Архитектура мультивендорного маркетплейса и обработка возвратов." },
  { tag: "28 АПР", title: "СБП в офлайне: интеграция за рабочий день", desc: "Что происходит на стороне кассы и как настроить динамический QR на курьере." }];
  const [i, setI] = useState(0);
  const cur = items[i];
  const prev = () => setI((x) => (x - 1 + items.length) % items.length);
  const next = () => setI((x) => (x + 1) % items.length);
  return (
    <div className="hero-news">
      <div className="hero-news-head">
        <span className="hero-news-label">Новое</span>
        <div className="hero-news-nav">
          <button onClick={prev} aria-label="Назад">←</button>
          <span className="hero-news-count">{i + 1}/{items.length}</span>
          <button onClick={next} aria-label="Вперёд">→</button>
        </div>
      </div>
      <div className="hero-news-body">
        <div className="hero-news-date">{cur.tag} 2026</div>
        <div className="hero-news-title">{cur.title}</div>
        <div className="hero-news-desc">{cur.desc}</div>
        <span className="btn-link" style={{ fontSize: 13, marginTop: "auto", borderBottom: "none", paddingBottom: 0, alignSelf: "flex-start" }}>Читать статью →</span>
      </div>
    </div>);
};

const Hero = () =>
<section className="container" style={{ paddingTop: 64, paddingBottom: 48, margin: "0px 32px 0px 10px", padding: "64px 40px 100px" }}>
    <div className="crumbs"><span>Главная</span><span>Журнал</span></div>
    <div className="hero-grid" style={{ marginTop: 32 }}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-start", textAlign: "left" }}>
        <h1 style={{ lineHeight: 1.02, fontWeight: 600, letterSpacing: "-0.03em", margin: 0, fontSize: "48px", whiteSpace: "nowrap" }}>
          Финтех-журнал «Монета»
        </h1>
        <p className="lede mt-24" style={{ maxWidth: "56ch", fontSize: "16px", margin: "24px 0 0" }}>
          Экспертиза в платёжных решениях для бизнеса. Кейсы компаний, разборы интеграций
          и практические рекомендации по снижению комиссии, росту конверсии и управлению платежами.
        </p>
      </div>
      <HeroNewsTeaser />
    </div>
  </section>;


/* ---------- Latest as cards (4-5) with arrows ---------- */
